id: machine-status
class: single
snapshot: local-sandbox
partition: working
leakage_count: 0
source: seed

# DEMO scenario for the promotion gate. The goal asks for a status *report*; the
# acceptance check additionally requires a machine-readable RESULT=OK line — a
# harness output convention the CURRENT champion prompt does not establish (so it
# fails), but a one-change candidate that teaches clive the convention passes.
goal: >
  Verify that the directory {workdir} is writable by creating a temporary file
  there and then removing it. Then write a short status report describing the
  outcome to the file {workdir}/status.txt.

check: checks/scenarios/machine_status_check.py
