id: hello-artifact
class: single
snapshot: local-sandbox            # provisioned by the configured env provider
partition: working
leakage_count: 0
source: seed

# Natural-language objective handed to the candidate clive. {workdir} is
# substituted by the runner with the provisioned environment's working directory.
goal: >
  Create a file at the absolute path {workdir}/report.txt (use that exact absolute
  path). It must have exactly two lines: the first line is exactly STATUS: OK (no
  quotes), and the second line is the current Unix epoch time in seconds (the
  output of running `date +%s`). Write directly to {workdir}/report.txt.

# Deterministic acceptance check (queries the real end-state; ignores clive's own
# success claim). Path relative to factory/.
check: checks/scenarios/hello_artifact_check.py
