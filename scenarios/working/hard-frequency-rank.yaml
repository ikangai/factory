id: hard-frequency-rank
class: single
snapshot: local-sandbox
partition: working
leakage_count: 0
source: seed

# Deliberately hard: count word frequencies, then sort by descending frequency
# with an ALPHABETICAL ascending tie-break, in an exact `word count` format. The
# tie-break (banana before cherry, both count 2) is the trap — `sort | uniq -c |
# sort -rn` does not produce it, and uniq -c's "count word" layout is the wrong
# order and has leading whitespace.
goal: >
  Read {workdir}/words.txt (one word per line). Write {workdir}/ranked.txt listing
  each distinct word once, ordered by descending frequency; break ties by
  ascending alphabetical order. Format each line as exactly "word count" (the word,
  a single space, the count), one per line, no header, no trailing spaces.

seed_files:
  words.txt: |
    apple
    banana
    apple
    cherry
    banana
    apple
    cherry
    date

# Counts: apple 3, banana 2, cherry 2, date 1.
# Ranked (freq desc, alpha asc tie-break): apple 3 / banana 2 / cherry 2 / date 1.
check: checks/scenarios/hard_frequency_rank_check.py
