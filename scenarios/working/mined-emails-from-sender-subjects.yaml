id: mined-emails-from-sender-subjects
class: single
snapshot: local-sandbox
goal: In {workdir}, find every email under {workdir}/mail whose From header names
  Matthew Berman, and write the Subject line text of each (subject only, without the
  'Subject:' prefix) to {workdir}/subjects.txt, one per line, in ascending filename
  order.
