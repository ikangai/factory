check: checks/scenarios/mined_emails_from_sender_subjects_check.py
rationale: 'Mined from ''find all the mails from matthew berman ...'' (2026-04-09,
  repeated). The ''summary'' output is ungradeable, so re-cast to the gradeable core:
  filter by From, extract the Subject field. Five fixed seed emails (3 matching, 2
  distractors) make the result deterministic, and it exercises a filter+extract skill
  distinct from the pure-count scenario.'
