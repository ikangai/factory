id: mined-extract-headlines-from-html
class: single
snapshot: local-sandbox
goal: In {workdir}, parse the saved page {workdir}/index.html and write the text of
  every story headline (each anchor with class title) to {workdir}/headlines.txt,
  one headline per line, in document order.
seed_files:
  index.html: '<html><body>

    <ul id="stories">

    <li><a class="title">First headline about AI</a></li>

    <li><a class="title">Second headline about terminals</a></li>

    <li><a class="title">Third headline about agents</a></li>

    </ul>

    </body></html>

    '
check: checks/scenarios/mined_extract_headlines_from_html_check.py
rationale: Mined from 'check the headlines from hackernews' and 'give me the headlines
  from derstandard.at' (2026-04-10). The live-fetch answer is non-reproducible; re-cast
  as a hermetic local HTML-parse over a fixed seed page so the extracted set and order
  are deterministic.
source: mined
partition: working
leakage_count: 0
