id: multi-clive-relay
class: multi-clive               # exercises clive-to-clive comms (the Rooms system)
snapshot: local-sandbox
partition: working
leakage_count: 0
source: seed

# Two clives coordinate over a Rooms lobby: a sender announces a token in the
# room; a receiver acts on it by writing the token to the shared workdir. The
# acceptance check verifies the WORLD result (the coordinated end-state), because
# the channel itself is a place where a claim can replace a fact (§12).
room: factory-relay
token: RELAY-7F3A-OK            # the fact that must travel A -> room -> B -> disk

members:
  - name: alice
    role: sender
    goal: >
      You are in a Rooms lobby. Announce this exact token to the room so your
      peer can act on it: RELAY-7F3A-OK
  - name: bob
    role: receiver
    goal: >
      You are in a Rooms lobby. When your peer announces a token of the form
      RELAY-XXXX-OK, write that exact token (and nothing else) to the file
      {workdir}/relayed.txt.

goal: >
  Coordinate over the room so the token RELAY-7F3A-OK travels from the sender to
  the receiver, and the receiver writes it to {workdir}/relayed.txt.

check: checks/scenarios/multi_clive_relay_check.py
