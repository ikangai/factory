id: hard-invoice-sum
class: single
snapshot: local-sandbox
partition: working
leakage_count: 0
source: seed

# Deliberately hard: multi-step (parse CSV, skip header, exact-match filter,
# validate field count, sum, write a bare integer) with two traps — a malformed
# 2-field row that must be skipped, and a 'Paid' (capitalised) row that must NOT
# match the exact lowercase 'paid'.
goal: >
  Read the CSV at {workdir}/data.csv (header: id,status,amount). Sum the amount
  column over the data rows whose status column is exactly "paid" (lowercase),
  skipping any malformed row that does not have exactly three comma-separated
  fields. Write the total as a plain integer (digits only, no label) to
  {workdir}/total.txt.

seed_files:
  data.csv: |
    id,status,amount
    1,paid,100
    2,pending,50
    3,paid,200
    4,paid
    5,Paid,999
    6,paid,75

# Correct answer: paid+3-field rows are 1(100), 3(200), 6(75) = 375.
# Row 2 is pending; row 4 is malformed (2 fields); row 5 is 'Paid' (case).
check: checks/scenarios/hard_invoice_sum_check.py
