id: heldout-artifact
class: single
snapshot: local-sandbox
partition: held-out          # NEVER visible to the proposer; scored rarely
leakage_count: 0
source: seed

# A different shape from the working-set task, so it measures generalisation
# rather than memorisation.
goal: >
  In the directory {workdir}, create a file named result.json containing a single
  JSON object with two keys: "ok" set to the boolean true, and "count" set to the
  integer number of regular files currently in {workdir} (count result.json
  itself if it already exists when you count).

check: checks/scenarios/heldout_artifact_check.py
