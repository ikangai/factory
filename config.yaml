# clive-harness-factory configuration (Phase 0).
# Everything is files + a SQLite store, for inspectability. No hidden state.

# --- target under test ------------------------------------------------------
# The factory is REPO-AGNOSTIC: it optimises whatever TARGET this section names.
# `provider` selects the adapter (factory/adapters/<provider>.py) that knows how
# to actuate a spec into, and invoke, that target. `clive` is the default and the
# reference adapter. Pointing the factory at a DIFFERENT repo = (1) write a new
# adapter under factory/adapters/, (2) register it in common.config.get_adapter,
# (3) set `provider` here + the target's root/entry/interpreter below.
#
# BACKWARD COMPAT: a legacy top-level `clive:` block (the previous layout) is
# still honoured — common.config.target_config() treats it as the clive target,
# so older configs keep working unchanged. Where both exist, `target:` wins and
# `clive:` fills in any keys it omits.
target:
  provider: "clive"        # which adapter drives the target (default: clive)
  # Repo root of the TARGET being optimised. The factory is standalone
  # (/Development/factory), so this points at the sibling clive repo. Relative to
  # factory/, or absolute.
  root: "../clive"
  # Interpreter used to run the candidate target. CLAUDE.md: "no virtualenv is
  # active" — clive runs under system python3. Override to ".venv/bin/python"
  # if you keep deps in a venv.
  python: "python3"
  entry: "clive.py"
  # Toolset handed to the candidate unless a candidate spec's open block
  # actuates a different one.
  default_toolset: "minimal"
  # The graduation/release branch graduated work fast-forwards onto and is pushed
  # to origin. `factory graduate` (and the autopilot after a shift ships) does:
  # ff base_branch -> factory/auto, push origin base_branch, then sync the target's
  # GitHub issues for the pushed commits. Defaults to chore/extract-factory.
  base_branch: "chore/extract-factory"

# --- environment provisioning (§6, §11) ------------------------------------
env:
  provider: "local"        # local | docker  (local is the Phase-0 default)
  docker:
    image: "clive-factory-env:base"   # built from envs/Dockerfile.base
    network: "none"                    # no network reach by default
    mem_mb: 512
    pids_limit: 256

# --- budgets & concurrency (§5, §9, §11) -----------------------------------
budget:
  # Hard per-run cap handed to clive's --max-tokens. Generous enough that a
  # capable model can finish a real task; clive enforces it per-plan.
  per_run_max_tokens: 16000
  # Wall-clock cap per run (seconds). Circuit breaker.
  per_run_timeout_s: 200
  # Hard ceiling for a whole evaluation round (tokens). Abort + flag if exceeded.
  round_max_tokens: 400000
  # Cost model: tokens are priced via evals/harness/pricing.json when available.
  default_price_per_mtok: 1.0

concurrency:
  # Worker cap — evaluation is embarrassingly parallel but capped (gain governor).
  cap: 2

# --- triggers (§9) ----------------------------------------------------------
triggers:
  # Optimisation loop fires only when at least this many NEW failure cases have
  # accumulated since the last proposal. The gain governor.
  new_failures_to_propose: 3
  # Stop a search after K rounds with no measurable improvement (read against
  # the held-out signal, not in isolation).
  no_improvement_rounds: 3

# --- spec mutation rules (§4) ----------------------------------------------
spec:
  # "one bounded change": max number of top-level open keys a candidate may
  # change vs its parent. Frozen changes are always rejected.
  max_changed_open_keys: 1

# --- super-workers (full-capability claude -p; opt-in) ----------------------
# By default every role is an ISOLATED one-shot `claude -p` (no tools/plugins) — the
# safe, proven path. A role listed here instead runs as a SUPER-WORKER: a
# full-capability `claude -p` with a curated, Bash-LESS toolset (Read/Write/Edit/Grep/
# Glob + Task/Workflow for internal fan-out) under --permission-mode acceptEdits, with
# its file tools steered into its OWN disposable sandbox dir + a deny-by-default env +
# a turn cap. It can run /workflows + subagents internally but must still return its
# role's exact contract. The board + conductor + human promotion gate are unchanged.
#
# SOFT boundary (like the local env): safe for fan-out, but NOT a hard jail. Enabling
# Bash/web reopens host-file + network reach — those need the docker hard boundary
# (not yet wired for super-workers), and never enable a shell-capable super-worker for
# a blindness-critical role (the proposer) until then.
roles:
  # e.g. ["proposer"] or "*" for all. Empty = every role stays isolated (default).
  super_workers: []

# --- the Guest House: where a DEVELOPER super-worker runs (the fleet) -------
# A developer super-worker (which edits the target's CODE) runs as a separate macOS
# Standard User — a HARD, OS-enforced boundary protecting the operator's files/creds,
# so Bash is safe. Headless operation needs TWO one-time operator setups:
#   1. that user's OWN claude (a binary THAT user can execute — NOT the operator's
#      ~/.local/bin/claude, which is unreadable to them). Find it:
#        sudo -u Agent -i bash -lc 'command -v claude'
#   2. a passwordless sudoers grant so the headless factory never hits a password prompt:
#        sudo visudo -f /etc/sudoers.d/clive-factory
#        <operator> ALL=(Agent) NOPASSWD: <that claude path>
# Leave `user` empty to keep developer workers OFF until the Guest House is wired.
super_worker:
  user: "agent"
  claude_bin: "/Users/agent/.local/bin/claude"   # agent's OWN claude (a path agent can execute)
  # Load the worker's USER plugins/skills/MCP so it's a FULL claude instance — the agora
  # plugin, the diary skill, and MCP servers (chrome-devtools). "" = isolated (no
  # plugins/hooks/MCP). acceptEdits + the curated toolset keep non-listed MCP tools
  # (the operator's Gmail/Drive/etc.) out of reach even when loaded.
  settings: "user"
  # Extra tool grants beyond the curated developer set — e.g. an MCP server the developer
  # needs to test web things. VERIFY the exact allow-string on the first live run (the
  # MCP tool names appear as mcp__<server>__<tool>; the server-level grant is mcp__<server>).
  extra_tools:
    - "mcp__plugin_chrome-devtools-mcp_chrome-devtools"   # chrome-devtools (browser testing)
  # The agora squad the worker joins — its OWN, so a headless one-shot worker never blocks
  # on the operator's team barrier.
  squad: "factory-workers"
  # The rail auto-refills the backlog from research (a researcher super-worker proposes new
  # directions toward the mission) BEFORE a shift whenever the open backlog is below this
  # threshold — so the generative loop runs deterministically, not at the conductor's
  # discretion. Set to 0 to disable rail-driven research.
  refill_threshold: 2
  # GSD spec-driven pre-dispatch scope check: before a developer worker is spent, a fast
  # read-only judge decides whether each claimed task is ONE bounded, landable, testable
  # change (pass | split | reject). Kills no_candidate upstream where rejection is free.
  # Fail-open (a judge error -> dispatch anyway). Enabled 2026-06-27 (operator).
  scope_check: true
  scope_check_max_turns: 6
  scope_check_timeout_s: 180
  # GSD spec-bound acceptance gate: a candidate that changes SOURCE code but ships NO test is
  # discarded by the gate (stage 'no_test'), so a merge proves the work, not just non-regression.
  # Test-only / docs-only / empty diffs pass. Enabled 2026-06-30 (operator).
  require_test: true
  # GSD auto-decomposition: when a worker returns no_candidate (brief too big to land), split it
  # into a sequenced chain of single-surface sub-tasks (open, source=worker) instead of just
  # blocking — turning the #1 failure into forward progress. Complements scope_check (#1 splits
  # BEFORE dispatch; this splits AFTER a worker fails). Fail-safe (no split -> canned lesson).
  auto_decompose: true
  decompose_max_turns: 8
  decompose_timeout_s: 240

# --- held-out hygiene (§7) --------------------------------------------------
held_out:
  # Retire a held-out scenario once it has influenced this many promotion
  # decisions (leakage budget). Replace from freshly mined, vetted scenarios.
  leakage_threshold: 5
  # How often the held-out set is sampled during a promotion check.
  sample_size: 1

# --- promotion rule (§9) — evaluated, then surfaced to the HUMAN gate -------
promotion:
  # A challenger must beat the champion on the working set by at least this
  # margin (pass-rate delta) to be queued.
  working_set_min_delta: 0.0001
  # It must not regress on the held-out sample or across the model panel by
  # more than this tolerance.
  regression_tolerance: 0.0
  # Nothing promotes automatically in Phase 0. Promotion is a human action.
  autonomous: false

# --- autonomy: the unattended 09:00 daily run -------------------------------
autonomy:
  # `factory daily` (the launchd 09:00 agent) runs a LARGER bounded session so
  # the factory makes real headway overnight. These are HARD ceilings; the loop
  # still stops early on no-improvement / research-exhausted. Promotion is NEVER
  # automatic — candidates only ever reach 'awaiting_gate' for the human.
  daily_max_rounds: 8
  daily_token_budget: 500000        # PER-SHIFT token guideline
  # the continuous `run --loop` / autopilot ceilings (HARD brakes for unattended AUTO):
  loop_token_budget: 5000000        # stop after ~5M cumulative output tokens across shifts (0 = unlimited)
  loop_deadline_s: 14400            # …or after 4h wall-clock, whichever first (+ max_shifts=50)

# --- autopilot: the dashboard AUTO toggle's runner --------------------------
autopilot:
  # Toggling AUTO on the board spawns `factory run --loop` with these. real=true lands gated
  # merges on the REVERSIBLE factory/auto branch (the useful default). prod=false = DEV/
  # same-user (the conductor + workers run as YOU with Bash + your MCP) — fine while you watch
  # the board, but it is NOT the Guest-House boundary; set prod=true once the agent user is
  # provisioned for a truly unattended run. Set real=false to exercise the loop on throwaway
  # clones (no real merges).
  real: true
  prod: false

# --- board ------------------------------------------------------------------
dashboard:
  host: "127.0.0.1"
  port: 8787
