<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>clive-harness-factory — operator board</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>clive-harness-factory <span class="dim">· operator board</span></h1>
    <div id="phase" class="phase"></div>
    <div class="dim" id="updated"></div>
  </header>

  <!-- Divergence alarm: shown loudly when the proxy may be gamed (Goodhart). -->
  <section id="alarm" class="alarm hidden"></section>

  <main>
    <section class="panel">
      <h2>Kanban</h2>
      <div id="kanban" class="kanban"></div>
    </section>

    <section class="panel">
      <h2>Promotion queue <span class="dim">· the human gate</span></h2>
      <div id="queue"></div>
    </section>

    <div class="row">
      <section class="panel half">
        <h2>Scoreboard <span class="dim">· champion vs challengers × panel</span></h2>
        <div id="scoreboard"></div>
      </section>
      <section class="panel half">
        <h2>Held-out leakage meter</h2>
        <div id="leakage"></div>
      </section>
    </div>

    <div class="row">
      <section class="panel half">
        <h2>Cost burn</h2>
        <div id="cost"></div>
      </section>
      <section class="panel half">
        <h2>Safety flags</h2>
        <div id="safety"></div>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
