# Panel intelligences (spec §5) — the models that DRIVE the candidate clive
# during evaluation. CONFIGURED, not a factory role. Plus one held-out model
# never used during optimisation (only to detect a harness overfit to the panel).
#
# Credentials are NOT stored here. The entry marked `smoke: true` is the single
# model the Phase-0 smoke test drives the pipeline with.

panel:
  # Drives clive on your Claude Code SUBSCRIPTION via `claude -p` (no API spend).
  # provider 'claude-cli' shells out to the claude CLI; auth comes from ~/.claude.
  # model: sonnet | opus | haiku (or omit for Claude Code's default).
  - name: claude-cli
    provider: claude-cli
    model: sonnet
    tier: default
    smoke: true

  # A second panel model (API). Uncomment to widen the panel; needs a key in .env.
  # - name: or-flash
  #   provider: openrouter        # OPENROUTER_API_KEY
  #   model: google/gemini-3-flash-preview
  #   tier: fast

# Held-out model: NEVER used during optimisation; scored only to detect overfit
# to the panel. Actuated on operator cadence via `factory holdout-check <cid>`.
# Also on `claude -p` (the subscription, no API spend) but a DIFFERENT model from
# the sonnet panel (opus) so it's still a genuine cross-check — a candidate that
# only works because it overfit the sonnet panel should slip against opus.
held_out:
  - name: claude-cli-opus
    provider: claude-cli           # subscription via `claude -p`; no API key
    model: opus
    tier: gold
